<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Inputs - Acoustic Connect</title>

    <!-- Load SDK -->
    <script>
      (function() {
        var base = window.location.pathname.includes('/test-website/') ? '/test-website' : '';
        var s = document.createElement('script');
        s.src = base + '/scripts/acoconnect.js';
        s.onload = function() {
          var appKey = localStorage.getItem('appKey') || '825d6c04baa54875a7fa2462912acb46';
          var wsCollectorUrl = localStorage.getItem('wsCollectorUrl') || 'https://collector-eaoc.qa.goacoustic.com/collector/collectorPost';
          window.TLT && window.TLT.initLib(appKey, wsCollectorUrl);
        };
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
